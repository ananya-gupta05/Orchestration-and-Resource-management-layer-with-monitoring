# PgBouncer Connection Pooler

---
apiVersion: v1
kind: ConfigMap

metadata:
  name: pgbouncer-config
  namespace: intellidb

data:
  userlist.txt: |
    "postgres" "postgres"

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: pgbouncer
  namespace: intellidb
  labels:
    app: pgbouncer

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pgbouncer

  template:
    metadata:
      labels:
        app: pgbouncer

    spec:
      containers:
        - name: pgbouncer

          image: pgbouncer/pgbouncer

          env:
            - name: DATABASES_HOST
              value: postgres-primary

            - name: DATABASES_PORT
              value: "5432"

            - name: DATABASES_DBNAME
              value: intellidb

          ports:
            - containerPort: 6432
              name: pgbouncer

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"

          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: pgbouncer-service
  namespace: intellidb
  labels:
    app: pgbouncer

spec:
  selector:
    app: pgbouncer

  ports:
    - port: 6432
      targetPort: 6432
      name: pgbouncer

  type: ClusterIP