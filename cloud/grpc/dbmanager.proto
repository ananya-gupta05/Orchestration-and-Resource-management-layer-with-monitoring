syntax = "proto3";

package dbmanager;

// ── Service Definition ─────────────────────────────────────────
service Dbmanager {
  // Called when a new tenant signs up
  rpc CreateTenantSchema (CreateSchemaRequest) returns (CreateSchemaResponse);

  // Called when a tenant is deleted
  rpc DeleteTenantSchema (DeleteSchemaRequest) returns (DeleteSchemaResponse);

  // Called by telemetry layer to get live DB stats
  rpc GetTelemetry (TelemetryRequest) returns (TelemetryResponse);

  // Called to get per-tenant schema size + connection count
  rpc GetTenantStats (TenantStatsRequest) returns (TenantStatsResponse);

  // Canonical name (UML). Alias of CreateTenantSchema — same request/response + handler.
  rpc InitializeDatabase (CreateSchemaRequest) returns (CreateSchemaResponse);
}

// ── CreateTenantSchema ─────────────────────────────────────────
message CreateSchemaRequest {
  int32 tenant_id    = 1;
  string schema_name = 2;  // e.g. "tenant_1001"
  string user_name   = 3;
  string company     = 4;
  string node        = 5;  // e.g. "db-node-2" (from Cloud layer)
  string storage     = 6;  // e.g. "10 GB"
  string ram         = 7;  // e.g. "4 GB"
  int32  conn_limit  = 8;  // connection limit for this tenant's role
}

message CreateSchemaResponse {
  string status      = 1;  // "success" or "error"
  string schema_name = 2;
  string message     = 3;
  string db_username = 4;
  string db_password = 5;
}

// ── DeleteTenantSchema ─────────────────────────────────────────
message DeleteSchemaRequest {
  int32  tenant_id   = 1;
  string schema_name = 2;  // e.g. "tenant_1001"
}

message DeleteSchemaResponse {
  string status      = 1;  // "TERMINATED" or "error"
  string schema_name = 2;
  string message     = 3;
}

// ── GetTelemetry ───────────────────────────────────────────────
message TelemetryRequest {
  // empty — just asking for global DB stats
}

message ConnectionStat {
  string state = 1;
  int32  total = 2;
}

message TopQuery {
  string query          = 1;
  int32  calls          = 2;
  double mean_exec_time = 3;
  double total_exec_time = 4;
}

message TelemetryResponse {
  string status                    = 1;
  repeated ConnectionStat connections = 2;
  int64  wal_records               = 3;
  int64  wal_bytes                 = 4;
  int64  wal_fpi                   = 5;
  int64  blks_hit                  = 6;
  int64  blks_read                 = 7;
  int64  xact_commit               = 8;
  int64  xact_rollback             = 9;
  repeated TopQuery top_queries    = 10;
}

// ── GetTenantStats ─────────────────────────────────────────────
message TenantStatsRequest {
  string schema_name = 1;
}

message TenantStatsResponse {
    string status = 1;
    string schema_name = 2;
    string schema_size = 3;
    int32 active_connections = 4;
    float schema_size_gb = 5;
    float query_count = 6;
    float average_query_latency_ms = 7;
    float io_operations = 8;
    float rows_returned = 9;
    float query_frequency = 10;
    float result_size_mb = 11;
    float write_operations = 12;
}